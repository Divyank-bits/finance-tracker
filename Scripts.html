document.addEventListener('DOMContentLoaded', () => {

// ── NAVIGATION ────────────────────────────────────────────────────────────
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  currentPage = page;
  const order = ['dashboard','add','transactions','charts','import','settings'];
  const pills  = document.querySelectorAll('.nav-pill');
  const idx    = order.indexOf(page);
  if (idx >= 0 && pills[idx]) pills[idx].classList.add('active');
  const bnEl = document.getElementById('bn-' + page);
  if (bnEl) bnEl.classList.add('active');
  if (page === 'dashboard')    loadDashboard();
  if (page === 'transactions') loadTransactions();
  if (page === 'charts')       loadCharts();
  if (page === 'settings')     loadSettings();
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast'+(isError?' error':'')+' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}
