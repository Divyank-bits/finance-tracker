<script>
// ── ADD TRANSACTION ────────────────────────────────────────────────────────
function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-tab').forEach(t =>
    t.classList.remove('active','expense','income','transfer','cashback','investment','lend','recover'));
  btn.classList.add('active', type.toLowerCase());

  document.getElementById('category-group').style.display =
    type === 'Transfer' ? 'none' : 'block';
  document.getElementById('lend-fields').style.display =
    type === 'Lend' ? 'flex' : 'none';
  document.getElementById('cashback-toggle-row').style.display =
    (type === 'Investment' || type === 'Lend') ? 'none' : 'flex';

  _filterCategoriesForType(type);

  if (type === 'Recover') _loadOpenLendPicker();
  else document.getElementById('lend-recovery-group').style.display = 'none';
}

let _openLends = [];

function _loadOpenLendPicker() {
  const group = document.getElementById('lend-recovery-group');
  const sel = document.getElementById('f-open-lend');
  sel.innerHTML = '<option value="">Loading…</option>';
  group.style.display = 'block';
  google.script.run.withSuccessHandler(lends => {
    _openLends = lends || [];
    sel.innerHTML = '<option value="">— select person —</option>' +
      lends.map(l => `<option value="${l.id}">${l.description} — ₹${parseFloat(l.amount).toLocaleString('en-IN')} (${l.date})</option>`).join('');
    // only show if there are open lends
    group.style.display = lends.length ? 'block' : 'none';
  }).getOpenLends();
}

function onOpenLendSelect(id) {
  if (!id) return;
  const lend = _openLends.find(l => l.id === id);
  if (!lend) return;
  document.getElementById('f-amount').value = lend.amount;
  document.getElementById('f-desc').value = lend.description;
  document.getElementById('f-account').value = lend.account || document.getElementById('f-account').value;
}

function _filterCategoriesForType(type) {
  const filtered = config.categories.filter(c =>
    (config.categoryTypeMap[c] || 'Expense') === type
  );
  const toShow = filtered.length ? filtered : config.categories;
  document.getElementById('f-category').innerHTML =
    toShow.map(c => `<option value="${c}">${CATEGORY_ICONS[c]||'•'} ${c}</option>`).join('');
}

function toggleCashback() {
  cashbackOn = !cashbackOn;
  document.getElementById('cb-toggle').classList.toggle('on', cashbackOn);
  document.getElementById('cashback-fields').style.display = cashbackOn ? 'block' : 'none';
}

function submitTransaction() {
  const amount = parseFloat(document.getElementById('f-amount').value);
  if (!amount || amount <= 0) { showToast('Enter a valid amount', true); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const linkedLendId = document.getElementById('f-open-lend')?.value || '';
  const data = {
    date: document.getElementById('f-date').value,
    type: currentType,
    category: document.getElementById('f-category').value,
    amount,
    account: document.getElementById('f-account').value,
    description: document.getElementById('f-desc').value,
    notes: document.getElementById('f-notes').value,
    isCashback: cashbackOn,
    cashbackAmount: cashbackOn ? parseFloat(document.getElementById('f-cashback-amt').value)||0 : 0,
    linkedTxId: linkedLendId
  };

  google.script.run
    .withSuccessHandler(res => {
      btn.disabled = false; btn.textContent = 'Add Transaction';
      if (res.success) {
        showToast('Transaction added!');
        ['f-amount','f-desc','f-notes','f-lend-person','f-lend-due','f-open-lend'].forEach(id => {
          const el = document.getElementById(id); if(el) el.value = '';
        });
        if (cashbackOn) { toggleCashback(); document.getElementById('f-cashback-amt').value = ''; }

        if (currentType === 'Lend') {
          const person = document.getElementById('f-lend-person').value.trim();
          const dueDate = document.getElementById('f-lend-due').value;
          if (person) {
            google.script.run.addLendingEntry({
              linkedTxId: res.id, person, amount: data.amount,
              date: data.date, dueDate, notes: data.notes
            });
          }
        }
      } else showToast('Error: ' + res.error, true);
    })
    .withFailureHandler(err => {
      btn.disabled=false; btn.textContent='Add Transaction';
      showToast('Failed: '+(err?.message||''), true);
    })
    .addTransaction(data);
}
</script>
